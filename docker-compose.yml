version: '3.9'

services:
  api:
    build:
      context: .
      target: development
    container_name: pharmadash_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: '3000'
      DATABASE_URL: postgresql://pharmadash:pharmadash_pass@postgres:5432/pharmadash_db
    ports:
      - '3000:3000'
    volumes:
      - ./src:/app/src
      - ./prisma:/app/prisma
      - ./tsconfig.json:/app/tsconfig.json
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npm run prisma:generate && npm run dev"

  postgres:
    image: postgres:16-alpine
    container_name: pharmadash_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: pharmadash
      POSTGRES_PASSWORD: pharmadash_pass
      POSTGRES_DB: pharmadash_db
    ports:
      - '5432:5432'
    volumes:
      - pharmadash_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U pharmadash -d pharmadash_db']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pharmadash_pgdata:
