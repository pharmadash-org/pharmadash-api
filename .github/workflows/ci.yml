name: CI – Test & SonarCloud

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-and-analyze:
    name: Test & Sonar Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0  # Sonar necesita historial completo

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage
        env:
          NODE_ENV: test
          # Variables mínimas para que Zod no falle al importar módulos
          PORT: "3000"
          DATABASE_URL: "postgresql://fake:fake@localhost:5432/fake"
          AZURE_TENANT_ID: "00000000-0000-0000-0000-000000000000"
          AZURE_CLIENT_ID: "00000000-0000-0000-0000-000000000001"
          AZURE_AUDIENCE: "api://00000000-0000-0000-0000-000000000001"
          CORS_ORIGIN: "http://localhost:4200"
          LOG_LEVEL: "silent"

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@ba3875ecf642b2129de2b589510c81a8b53dbf4e # master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}